name: CI

on:
  push:
    branches: ['main']
  pull_request:
    types: [opened, synchronize]

env:
  NEXT_PUBLIC_WEB_URL: http://localhost:3000
  NEXT_PUBLIC_API_URL: http://localhost:3001
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ci-test-secret
  AUTH_RESEND_EMAIL: ci@test.com
  POSTGRES_PRISMA_URL: postgresql://postgres:postgres@localhost:5432/playmoney?schema=public
  POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@localhost:5432/playmoney?schema=public

jobs:
  checks:
    name: Check types, lint, and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run format
        run: npm run format

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run tests
        run: npm run test

  build:
    name: Build
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build
        run: npm run build
