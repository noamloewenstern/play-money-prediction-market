# Local dev override — exposes web, api, and jaeger ports to the host.
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.local.yml up -d
services:
  web:
    ports:
      - "${WEB_PORT:-3000}:3000"
  api:
    ports:
      - "${API_PORT:-3001}:3001"
  jaeger:
    ports:
      - "16686:16686"  # Jaeger UI  →  http://localhost:16686
      - "4318:4318"    # OTLP HTTP (useful for sending spans from local dev tools)
