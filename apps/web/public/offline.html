<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Money — Offline</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #ffffff;
        --fg: #0f172a;
        --muted: #64748b;
        --primary: #7c3aed;
        --border: #e2e8f0;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --fg: #f1f5f9;
          --muted: #94a3b8;
          --primary: #a78bfa;
          --border: #1e293b;
        }
      }

      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .container {
        text-align: center;
        max-width: 380px;
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: var(--primary);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-block;
        background: var(--primary);
        color: #fff;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }

      .btn:hover {
        opacity: 0.9;
      }

      .status {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: var(--muted);
        border-top: 1px solid var(--border);
        padding-top: 1rem;
      }

      #online-indicator {
        display: none;
        color: #22c55e;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">💰</div>
      <h1>You're offline</h1>
      <p>
        No internet connection. Check your network and try again — your previously viewed markets may still be
        available.
      </p>
      <button class="btn" onclick="tryReload()">Try again</button>
      <div class="status">
        <span id="online-indicator">You're back online! </span>
        <a href="/" style="color: inherit">Go to homepage →</a>
      </div>
    </div>

    <script>
      function tryReload() {
        window.location.reload()
      }

      window.addEventListener('online', () => {
        document.getElementById('online-indicator').style.display = 'inline'
        setTimeout(() => window.location.reload(), 800)
      })
    </script>
  </body>
</html>
